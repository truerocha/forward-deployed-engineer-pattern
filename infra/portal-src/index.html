<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="factory-api-url" content="">
    <title>Forward Deployed Software Factory</title>
    <script>
      // FOUC Prevention: Apply Cloudscape dark mode before any rendering
      (function() {
        var theme = localStorage.getItem('fde-theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('awsui-dark-mode');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
